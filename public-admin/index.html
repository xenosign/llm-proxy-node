<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Admin 대시보드</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">불러오는 중...</div>

  <script>
    function formatNumber(n) {
      return Number(n).toLocaleString('ko-KR');
    }

    function formatUsd(n) {
      return `$${Number(n).toFixed(4)}`;
    }

    function buildSummaryCard(summary) {
      const card = document.createElement('div');
      card.className = 'card';

      const h2 = document.createElement('h2');
      h2.textContent = '전체 사용량';
      card.appendChild(h2);

      const row = document.createElement('div');
      row.className = 'stat-row';
      row.innerHTML = `<span>사용 금액</span><span>${formatUsd(summary.total_cost_used)} / ${formatUsd(summary.total_budget_usd)}</span>`;
      card.appendChild(row);

      const tokenRow = document.createElement('div');
      tokenRow.className = 'stat-row';
      tokenRow.innerHTML = `<span>누적 토큰</span><span>${formatNumber(summary.total_tokens_used)} 토큰</span>`;
      card.appendChild(tokenRow);

      const bar = document.createElement('div');
      bar.className = 'bar';
      const barFill = document.createElement('div');
      barFill.className = 'bar-fill';
      barFill.style.width = `${summary.percent_used}%`;
      bar.appendChild(barFill);
      card.appendChild(bar);

      const remainingRow = document.createElement('div');
      remainingRow.className = 'stat-row';
      remainingRow.innerHTML = `<span>잔여 예산</span><span>${formatUsd(summary.remaining_usd)}</span>`;
      card.appendChild(remainingRow);

      return card;
    }

    function buildTokenCell(team) {
      const tokenTd = document.createElement('td');
      tokenTd.className = 'token-cell';

      const tokenValue = document.createElement('code');
      tokenValue.className = 'token-value';
      tokenValue.textContent = '*'.repeat(12);
      tokenTd.appendChild(tokenValue);

      const revealBtn = document.createElement('button');
      revealBtn.type = 'button';
      revealBtn.className = 'secondary';
      revealBtn.textContent = '확인';
      let revealed = false;
      revealBtn.addEventListener('click', () => {
        revealed = !revealed;
        tokenValue.textContent = revealed ? team.proxy_token : '*'.repeat(12);
        revealBtn.textContent = revealed ? '숨기기' : '확인';
      });
      tokenTd.appendChild(revealBtn);

      return tokenTd;
    }

    function buildUsageCell(team) {
      const td = document.createElement('td');
      td.className = 'usage-cell';

      const costDiv = document.createElement('div');
      costDiv.textContent = formatUsd(team.cost_used);
      td.appendChild(costDiv);

      const tokenDiv = document.createElement('div');
      tokenDiv.className = 'usage-tokens';
      tokenDiv.textContent = `${formatNumber(team.tokens_used)} 토큰`;
      td.appendChild(tokenDiv);

      return td;
    }

    function buildViewRow(team, onEdit) {
      const tr = document.createElement('tr');

      const nameTd = document.createElement('td');
      nameTd.textContent = team.name;
      tr.appendChild(nameTd);

      const loginTd = document.createElement('td');
      loginTd.textContent = team.login_id;
      tr.appendChild(loginTd);

      tr.appendChild(buildTokenCell(team));

      const passwordTd = document.createElement('td');
      passwordTd.textContent = '••••••••';
      tr.appendChild(passwordTd);

      tr.appendChild(buildUsageCell(team));

      const budgetViewTd = document.createElement('td');
      budgetViewTd.textContent = formatUsd(team.budget_usd);
      tr.appendChild(budgetViewTd);

      const remainingTd = document.createElement('td');
      remainingTd.textContent = formatUsd(team.remaining_usd);
      tr.appendChild(remainingTd);

      const percentTd = document.createElement('td');
      percentTd.textContent = `${team.percent_used.toFixed(1)}%`;
      tr.appendChild(percentTd);

      const actionTd = document.createElement('td');
      const editBtn = document.createElement('button');
      editBtn.className = 'secondary';
      editBtn.textContent = '수정';
      editBtn.addEventListener('click', onEdit);
      actionTd.appendChild(editBtn);
      tr.appendChild(actionTd);

      return tr;
    }

    function buildEditRow(team, onSave, onCancel) {
      const tr = document.createElement('tr');

      const nameTd = document.createElement('td');
      nameTd.textContent = team.name;
      tr.appendChild(nameTd);

      const loginTd = document.createElement('td');
      const loginInput = document.createElement('input');
      loginInput.value = team.login_id;
      loginTd.appendChild(loginInput);
      tr.appendChild(loginTd);

      tr.appendChild(buildTokenCell(team));

      const passwordTd = document.createElement('td');
      const passwordInput = document.createElement('input');
      passwordInput.type = 'password';
      passwordInput.placeholder = '변경 시에만 입력';
      passwordTd.appendChild(passwordInput);
      tr.appendChild(passwordTd);

      const usageTd = document.createElement('td');
      usageTd.className = 'usage-cell';
      const costInput = document.createElement('input');
      costInput.type = 'number';
      costInput.min = '0';
      costInput.step = '0.0001';
      costInput.value = team.cost_used;
      usageTd.appendChild(costInput);
      const tokensInput = document.createElement('input');
      tokensInput.type = 'number';
      tokensInput.min = '0';
      tokensInput.className = 'usage-tokens-input';
      tokensInput.value = team.tokens_used;
      usageTd.appendChild(tokensInput);
      tr.appendChild(usageTd);

      const budgetTd = document.createElement('td');
      const budgetInput = document.createElement('input');
      budgetInput.type = 'number';
      budgetInput.min = '0.01';
      budgetInput.step = '0.01';
      budgetInput.value = team.budget_usd;
      budgetTd.appendChild(budgetInput);
      tr.appendChild(budgetTd);

      const remainingSpacerTd = document.createElement('td');
      tr.appendChild(remainingSpacerTd);

      const percentSpacerTd = document.createElement('td');
      tr.appendChild(percentSpacerTd);

      const actionTd = document.createElement('td');
      actionTd.className = 'row-actions';

      const saveBtn = document.createElement('button');
      saveBtn.textContent = '저장';
      saveBtn.addEventListener('click', () =>
        onSave({
          login_id: loginInput.value.trim(),
          password: passwordInput.value,
          cost_used: costInput.value,
          tokens_used: tokensInput.value,
          budget_usd: budgetInput.value,
        })
      );
      actionTd.appendChild(saveBtn);

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'secondary';
      cancelBtn.textContent = '취소';
      cancelBtn.addEventListener('click', onCancel);
      actionTd.appendChild(cancelBtn);

      tr.appendChild(actionTd);

      return tr;
    }

    async function updateTeam(teamId, fields) {
      const body = {
        login_id: fields.login_id,
        cost_used: fields.cost_used,
        tokens_used: fields.tokens_used,
        budget_usd: fields.budget_usd,
      };
      if (fields.password) body.password = fields.password;

      const res = await fetch(`/api/admin/teams/${teamId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || 'update_failed');
      }
    }

    async function load() {
      const res = await fetch('/api/admin/teams', { credentials: 'include' });

      if (!res.ok) {
        window.location.href = '/admin/login.html';
        return;
      }

      const data = await res.json();
      const app = document.getElementById('app');
      app.innerHTML = '';

      const topBar = document.createElement('div');
      topBar.className = 'top-bar';
      const h1 = document.createElement('h1');
      h1.textContent = 'Admin 대시보드';
      topBar.appendChild(h1);
      const logoutBtn = document.createElement('button');
      logoutBtn.className = 'secondary';
      logoutBtn.textContent = '로그아웃';
      logoutBtn.addEventListener('click', async () => {
        await fetch('/api/admin/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/admin/login.html';
      });
      topBar.appendChild(logoutBtn);
      app.appendChild(topBar);

      app.appendChild(buildSummaryCard(data.summary));

      const tableCard = document.createElement('div');
      tableCard.className = 'card';

      const h2 = document.createElement('h2');
      h2.textContent = '팀별 사용량';
      tableCard.appendChild(h2);

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      thead.innerHTML = `
        <tr>
          <th>팀명</th>
          <th>로그인 ID</th>
          <th>API 토큰</th>
          <th>비밀번호</th>
          <th>사용량</th>
          <th>예산($)</th>
          <th>잔여 예산</th>
          <th>사용률</th>
          <th></th>
        </tr>
      `;
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      table.appendChild(tbody);
      tableCard.appendChild(table);
      app.appendChild(tableCard);

      function renderRow(team) {
        const viewRow = buildViewRow(team, () => {
          const editRow = buildEditRow(
            team,
            async (fields) => {
              try {
                await updateTeam(team.id, fields);
                await load();
              } catch (err) {
                alert(`수정 실패: ${err.message}`);
              }
            },
            () => editRow.replaceWith(renderRow(team))
          );
          viewRow.replaceWith(editRow);
        });
        return viewRow;
      }

      data.teams.forEach((team) => tbody.appendChild(renderRow(team)));
    }

    load();
  </script>
</body>
</html>
