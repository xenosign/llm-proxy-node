<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>사용량 대시보드</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">불러오는 중...</div>

  <script>
    function formatNumber(n) {
      return Number(n).toLocaleString('ko-KR');
    }

    function formatUsd(n) {
      return `$${Number(n).toFixed(4)}`;
    }

    function formatKrw(n) {
      return `₩${Math.round(Number(n)).toLocaleString('ko-KR')}`;
    }

    async function load() {
      const res = await fetch('/api/dashboard/usage', { credentials: 'include' });

      if (!res.ok) {
        window.location.href = '/dashboard/login.html';
        return;
      }

      const data = await res.json();
      const app = document.getElementById('app');
      app.innerHTML = '';

      const h1 = document.createElement('h1');
      h1.textContent = data.name;
      app.appendChild(h1);

      const usedRow = document.createElement('div');
      usedRow.className = 'stat-row';
      usedRow.innerHTML = `<span>사용 금액</span><span>${formatKrw(data.cost_used_krw)} (${formatUsd(data.cost_used)}) / ${formatKrw(data.budget_krw)} (${formatUsd(data.budget_usd)})</span>`;
      app.appendChild(usedRow);

      const tokenUsedRow = document.createElement('div');
      tokenUsedRow.className = 'stat-row';
      tokenUsedRow.innerHTML = `<span>누적 토큰</span><span>${formatNumber(data.tokens_used)} 토큰</span>`;
      app.appendChild(tokenUsedRow);

      const bar = document.createElement('div');
      bar.className = 'bar';
      const barFill = document.createElement('div');
      barFill.className = 'bar-fill';
      barFill.style.width = `${data.percent_used}%`;
      bar.appendChild(barFill);
      app.appendChild(bar);

      const remainingRow = document.createElement('div');
      remainingRow.className = 'stat-row-inline';
      remainingRow.innerHTML = `<span>잔여 예산</span><span>${formatKrw(data.remaining_krw)} (${formatUsd(data.remaining_usd)})</span>`;
      app.appendChild(remainingRow);

      const tokenRow = document.createElement('div');
      tokenRow.className = 'token-row';

      const tokenLabel = document.createElement('span');
      tokenLabel.textContent = 'API 토큰';
      tokenRow.appendChild(tokenLabel);

      const tokenValue = document.createElement('code');
      tokenValue.className = 'token-value';
      tokenValue.textContent = '*'.repeat(12);
      tokenRow.appendChild(tokenValue);

      const revealBtn = document.createElement('button');
      revealBtn.type = 'button';
      revealBtn.className = 'secondary';
      revealBtn.textContent = '확인';
      let revealed = false;
      revealBtn.addEventListener('click', () => {
        revealed = !revealed;
        tokenValue.textContent = revealed ? data.proxy_token : '*'.repeat(12);
        revealBtn.textContent = revealed ? '숨기기' : '확인';
      });
      tokenRow.appendChild(revealBtn);

      const copyBtn = document.createElement('button');
      copyBtn.type = 'button';
      copyBtn.className = 'secondary';
      copyBtn.textContent = '복사';
      copyBtn.addEventListener('click', async () => {
        await navigator.clipboard.writeText(data.proxy_token);
        copyBtn.textContent = '복사됨';
        setTimeout(() => {
          copyBtn.textContent = '복사';
        }, 1500);
      });
      tokenRow.appendChild(copyBtn);

      app.appendChild(tokenRow);

      const logoutBtn = document.createElement('button');
      logoutBtn.id = 'logout';
      logoutBtn.textContent = '로그아웃';
      logoutBtn.addEventListener('click', async () => {
        await fetch('/api/dashboard/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/dashboard/login.html';
      });
      app.appendChild(logoutBtn);
    }

    load();
  </script>
</body>
</html>
